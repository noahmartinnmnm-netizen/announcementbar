# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "0d5a4aeb03e94d71e4b0055101baa4aa"
name = "Smart Announcement Bar"
application_url = "https://example.com"
embedded = true

[access_scopes]
# App-owned shop metafields (declared below) do not require separate metafield scopes.
# read_metafields / write_metafields are not valid Shopify API scopes.
scopes = ""

[shop.metafields.smart_announcement.settings]
type = "json"
name = "Smart Announcement Bar Settings"
description = "Stores announcement bar configuration for the Smart Announcement Bar app"

  [shop.metafields.smart_announcement.settings.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
automatically_update_urls_on_dev = true
